name: CI

on:
  merge_group:
  pull_request:
    types: ['opened', 'edited', 'reopened', 'synchronize']
  push:
    branches: ['main']

jobs:
  build:
    strategy:
      matrix:
        node: ['24.15.0']
    runs-on: ubuntu-24.04
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_CACHE: 'remote:rw'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@2e223e0f0d2b8fd9872cbadb8b7428e5f8b5556d # Temporary fix for https://github.com/pnpm/action-setup/issues/225
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  typecheck:
    runs-on: ubuntu-24.04
    needs: [build]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@2e223e0f0d2b8fd9872cbadb8b7428e5f8b5556d # Temporary fix for https://github.com/pnpm/action-setup/issues/225
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.15.0
          check-latest: true
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile && pnpm build && pnpm install --frozen-lockfile
      - run: pnpm typecheck

  format:
    runs-on: ubuntu-24.04
    needs: [build]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@2e223e0f0d2b8fd9872cbadb8b7428e5f8b5556d # Temporary fix for https://github.com/pnpm/action-setup/issues/225
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.15.0
          check-latest: true
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile && pnpm build && pnpm install --frozen-lockfile
      - run: pnpm run format:check

  lint:
    runs-on: ubuntu-24.04
    needs: [build]
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_CACHE: 'remote:rw'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@2e223e0f0d2b8fd9872cbadb8b7428e5f8b5556d # Temporary fix for https://github.com/pnpm/action-setup/issues/225
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.15.0
          check-latest: true
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile && pnpm build && pnpm install --frozen-lockfile
      - run: pnpm run lint --format=github

  test:
    runs-on: ubuntu-24.04
    needs: [build]
    strategy:
      matrix:
        node: ['24.15.0']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@2e223e0f0d2b8fd9872cbadb8b7428e5f8b5556d # Temporary fix for https://github.com/pnpm/action-setup/issues/225
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          check-latest: true
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile && pnpm build && pnpm install --frozen-lockfile
      - run: pnpm run test:unit:coverage
      - uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: packages/**/coverage/cobertura-coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  test-types:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@2e223e0f0d2b8fd9872cbadb8b7428e5f8b5556d # Temporary fix for https://github.com/pnpm/action-setup/issues/225
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.15.0
          check-latest: true
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm run test:types
