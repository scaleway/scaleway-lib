name: CI

on:
  merge_group:
  pull_request:
    types: ['opened', 'edited', 'reopened', 'synchronize']
  push:
    branches: ['main']

jobs:
  build:
    strategy:
      matrix:
        node: ['24']
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5.0.0
      - uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ matrix.node }}
      - name: build
        run: |
          pnpm install --frozen-lockfile
          pnpm build

  typecheck:
    runs-on: ubuntu-24.04
    needs: [build]
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v5.0.0
      - name: Use Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24.14.1
          check-latest: true
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm typecheck
      # - run: pnpm typecheck:global

  typecheck-go:
    runs-on: ubuntu-24.04
    needs: [build]
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v5.0.0
      - name: Use Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24.14.1
          check-latest: true
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm typecheck:go

  lint:
    runs-on: ubuntu-24.04
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5.0.0
      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24.14.1
          check-latest: true
          cache: 'pnpm'
      - name: lint
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          pnpm check

  test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        node: ['24']
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v5.0.0
      - name: Use Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ matrix.node }}
          check-latest: true
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm test
      - uses: codecov/codecov-action@v5.5.4
        with:
          files: packages/**/coverage/cobertura-coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  test-types:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        node: ['24']
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v5.0.0
      - name: Use Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ matrix.node }}
          check-latest: true
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm test:types
