name: CI

on:
  merge_group:
  pull_request:
    types: ['opened', 'edited', 'reopened', 'synchronize']
  push:
    branches: ['main']

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_CACHE: 'remote:rw'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@2e223e0f0d2b8fd9872cbadb8b7428e5f8b5556d # Temporary fix for https://github.com/pnpm/action-setup/issues/225
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  typecheck:
    runs-on: ubuntu-24.04
    needs: [build]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@2e223e0f0d2b8fd9872cbadb8b7428e5f8b5556d # Temporary fix for https://github.com/pnpm/action-setup/issues/225
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile && pnpm build && pnpm install --frozen-lockfile
      - run: pnpm typecheck

  format:
    runs-on: ubuntu-24.04
    needs: [build]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@2e223e0f0d2b8fd9872cbadb8b7428e5f8b5556d # Temporary fix for https://github.com/pnpm/action-setup/issues/225
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile && pnpm build && pnpm install --frozen-lockfile
      - run: pnpm run format:check

  lint:
    runs-on: ubuntu-24.04
    needs: [build]
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_CACHE: 'remote:rw'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@2e223e0f0d2b8fd9872cbadb8b7428e5f8b5556d # Temporary fix for https://github.com/pnpm/action-setup/issues/225
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile && pnpm build && pnpm install --frozen-lockfile
      - run: pnpm run lint --format=github

  test:
    runs-on: ubuntu-24.04
    needs: [build]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@2e223e0f0d2b8fd9872cbadb8b7428e5f8b5556d # Temporary fix for https://github.com/pnpm/action-setup/issues/225
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile && pnpm build && pnpm install --frozen-lockfile
      - run: pnpm run test:unit:coverage
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: packages/**/coverage/cobertura-coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  test-types:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@2e223e0f0d2b8fd9872cbadb8b7428e5f8b5556d # Temporary fix for https://github.com/pnpm/action-setup/issues/225
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm run test:types
