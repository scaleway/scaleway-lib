catalogMode: strict
cleanupUnusedCatalogs: true

pmOnFail: error
# Needed as we run a pnpm install after building packages
optimisticRepeatInstall: false

allowBuilds:
  esbuild: true

peerDependencyRules:
  allowedVersions:
    "@types/react": 18 || 19
    react: 18 || 19
    react-dom: 18 || 19

savePrefix: ""

supportedArchitectures:
  cpu: [ x64, arm64 ]
  os: [ darwin, current ]

minimumReleaseAgeExclude:
  - "@scaleway/sdk-iam"
  - "@scaleway/sdk-std"
